<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <!-- Set the theme before first paint to avoid a flash -->
    <script>
        (function () {
            try {
                var stored = localStorage.getItem('isotube-theme');
                var dark = stored ? stored === 'dark' : true; /* dark is the default */
                document.documentElement.classList.toggle('dark', dark);
            } catch (e) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <title>Iso-Tube — Watch YouTube without the distraction</title>
    <meta name="description"
          content="Save, organize, and track your progress on YouTube videos in a calm, distraction-free player."/>

    <link rel="icon" href="/favicon.ico" sizes="any"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
    <link rel="manifest" href="/site.webmanifest"/>
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#17141f"/>
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f5fb"/>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400..700&family=JetBrains+Mono:wght@400..600&display=swap"/>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
